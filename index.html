<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NE-411 Study Hub</title>
  <meta name="description" content="Offline NE-411 reactor physics revision site for the 9 June exam.">
  <style>
    :root {
      --bg: #091014;
      --bg-2: #0e171c;
      --panel: #121d24;
      --panel-2: #17262d;
      --line: #263941;
      --line-2: #35515b;
      --text: #e7f2f2;
      --muted: #9eb3b5;
      --soft: #c4d7d7;
      --accent: #28d2bf;
      --accent-2: #f5b35a;
      --danger: #ff6b6b;
      --ok: #58d68d;
      --shadow: 0 20px 70px rgba(0, 0, 0, .35);
      --radius: 8px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html[data-theme="light"] {
      --bg: #f3f7f7;
      --bg-2: #e9f0f0;
      --panel: #ffffff;
      --panel-2: #f7fbfb;
      --line: #d5e2e3;
      --line-2: #bfd2d4;
      --text: #102025;
      --muted: #587076;
      --soft: #2d474f;
      --accent: #0a8f86;
      --accent-2: #b96e1e;
      --danger: #c83f4d;
      --ok: #188752;
      --shadow: 0 20px 70px rgba(34, 55, 61, .14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(40, 210, 191, .06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(40, 210, 191, .05) 1px, transparent 1px),
        radial-gradient(circle at 80% 0%, rgba(245, 179, 90, .12), transparent 34%),
        var(--bg);
      background-size: 64px 64px, 64px 64px, auto, auto;
      color: var(--text);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .app {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px;
      background: rgba(9, 16, 20, .86);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
      overflow: auto;
    }

    html[data-theme="light"] .sidebar {
      background: rgba(255, 255, 255, .86);
    }

    .brand {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 22px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line-2);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: var(--accent);
      background: linear-gradient(145deg, rgba(40, 210, 191, .12), rgba(245, 179, 90, .08));
    }

    .brand h1 {
      margin: 0;
      font-size: 1.14rem;
      line-height: 1.1;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .82rem;
    }

    .nav {
      display: grid;
      gap: 6px;
      margin: 16px 0 20px;
    }

    .nav button,
    .tool-button,
    .seg button,
    .small-action {
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--soft);
      background: transparent;
      transition: border-color .18s ease, background .18s ease, color .18s ease, transform .18s ease;
    }

    .nav button {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 10px;
      width: 100%;
      align-items: center;
      padding: 11px 12px;
      text-align: left;
      font-size: .92rem;
    }

    [dir="rtl"] .nav button {
      text-align: right;
      grid-template-columns: auto 1fr 22px;
    }

    .nav button:hover,
    .tool-button:hover,
    .small-action:hover,
    .seg button:hover {
      background: rgba(40, 210, 191, .08);
      border-color: var(--line);
      color: var(--text);
    }

    .nav button.active,
    .seg button.active {
      background: rgba(40, 210, 191, .13);
      border-color: rgba(40, 210, 191, .42);
      color: var(--text);
    }

    .count {
      color: var(--muted);
      font-size: .75rem;
      font-family: var(--mono);
    }

    .side-card {
      border: 1px solid var(--line);
      background: rgba(18, 29, 36, .72);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 12px;
    }

    html[data-theme="light"] .side-card {
      background: rgba(255, 255, 255, .72);
    }

    .side-card label,
    .field-label {
      display: block;
      color: var(--muted);
      font-size: .78rem;
      margin-bottom: 7px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg-2);
      color: var(--text);
      padding: 10px 11px;
      outline: none;
    }

    .textarea {
      min-height: 78px;
      resize: vertical;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: rgba(40, 210, 191, .65);
      box-shadow: 0 0 0 3px rgba(40, 210, 191, .12);
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .main {
      min-width: 0;
      padding: 22px 28px 56px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 18px;
    }

    .title h2 {
      margin: 0;
      font-size: clamp(1.65rem, 3vw, 2.7rem);
      line-height: 1.05;
    }

    .title p {
      margin: 9px 0 0;
      color: var(--muted);
      max-width: 820px;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tool-button,
    .small-action {
      min-height: 40px;
      min-width: 40px;
      padding: 9px 11px;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .small-action.primary {
      color: #071313;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 700;
    }

    html[data-theme="light"] .small-action.primary {
      color: white;
    }

    .mobile-menu {
      display: none;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px 180px;
      gap: 12px;
      margin: 18px 0;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat,
    .panel,
    .topic-card,
    .formula-card,
    .flashcard,
    .question-card,
    .figure-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(18, 29, 36, .92), rgba(14, 23, 28, .92));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    html[data-theme="light"] .stat,
    html[data-theme="light"] .panel,
    html[data-theme="light"] .topic-card,
    html[data-theme="light"] .formula-card,
    html[data-theme="light"] .flashcard,
    html[data-theme="light"] .question-card,
    html[data-theme="light"] .figure-card {
      background: linear-gradient(180deg, #ffffff, #f7fbfb);
    }

    .stat {
      padding: 15px;
      min-height: 98px;
    }

    .stat span {
      color: var(--muted);
      font-size: .78rem;
    }

    .stat strong {
      display: block;
      margin-top: 8px;
      font-size: 1.55rem;
      line-height: 1;
    }

    .stat em {
      display: block;
      margin-top: 8px;
      color: var(--accent);
      font-style: normal;
      font-size: .8rem;
    }

    .stat-bar,
    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(158, 179, 181, .14);
      overflow: hidden;
    }

    .stat-bar {
      margin-top: 12px;
    }

    .stat-bar i,
    .progress-track i {
      display: block;
      height: 100%;
      width: var(--value, 0%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(40, 210, 191, .22);
    }

    .exam-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.28fr) minmax(340px, .72fr);
      gap: 14px;
      margin-bottom: 16px;
    }

    .hero-panel {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(40, 210, 191, .28);
      border-radius: var(--radius);
      padding: 22px;
      background:
        linear-gradient(135deg, rgba(40, 210, 191, .16), transparent 42%),
        linear-gradient(180deg, rgba(18, 29, 36, .97), rgba(9, 16, 20, .95));
      box-shadow: var(--shadow);
    }

    html[data-theme="light"] .hero-panel {
      background:
        linear-gradient(135deg, rgba(10, 143, 134, .12), transparent 42%),
        linear-gradient(180deg, #ffffff, #eef6f6);
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      inset: auto -80px -90px auto;
      width: 230px;
      height: 230px;
      border: 1px solid rgba(245, 179, 90, .25);
      border-radius: 50%;
      background:
        radial-gradient(circle, transparent 28%, rgba(245, 179, 90, .08) 29%, transparent 31%),
        radial-gradient(circle, transparent 58%, rgba(40, 210, 191, .12) 59%, transparent 61%);
      pointer-events: none;
    }

    .hero-panel h3 {
      margin: 0;
      max-width: 720px;
      font-size: clamp(1.45rem, 3vw, 2.35rem);
      line-height: 1.08;
    }

    .hero-panel p {
      margin: 12px 0 0;
      max-width: 760px;
      color: var(--soft);
      line-height: 1.65;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .readiness-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      background: linear-gradient(180deg, rgba(18, 29, 36, .95), rgba(14, 23, 28, .95));
      box-shadow: var(--shadow);
    }

    html[data-theme="light"] .readiness-card {
      background: linear-gradient(180deg, #ffffff, #f7fbfb);
    }

    .readiness-score {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 16px;
      align-items: center;
    }

    .ring {
      width: 112px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, var(--panel) 0 58%, transparent 59%),
        conic-gradient(var(--accent) var(--score, 0%), rgba(158, 179, 181, .16) 0);
      border: 1px solid var(--line);
    }

    html[data-theme="light"] .ring {
      background:
        radial-gradient(circle at center, #ffffff 0 58%, transparent 59%),
        conic-gradient(var(--accent) var(--score, 0%), rgba(88, 112, 118, .18) 0);
    }

    .ring strong {
      font-size: 1.42rem;
      line-height: 1;
    }

    .readiness-card h3 {
      margin: 0;
      font-size: 1rem;
    }

    .readiness-card p {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .path-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .path-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: rgba(23, 38, 45, .64);
      min-height: 170px;
      display: grid;
      align-content: space-between;
      gap: 12px;
    }

    html[data-theme="light"] .path-card {
      background: #f7fbfb;
    }

    .path-card.active {
      border-color: rgba(40, 210, 191, .65);
      box-shadow: inset 0 0 0 1px rgba(40, 210, 191, .18);
    }

    .path-card h3 {
      margin: 0;
      font-size: 1rem;
    }

    .path-card p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.5;
    }

    .review-lane {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, .46fr);
      gap: 12px;
      align-items: stretch;
    }

    .next-topic {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
    }

    .formula-strip {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .formula-strip .equation {
      margin: 0;
    }

    .micro-list {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .micro-item {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 9px;
      color: var(--soft);
      line-height: 1.45;
      font-size: .9rem;
    }

    .micro-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 7px;
      background: var(--accent-2);
      box-shadow: 0 0 14px rgba(245, 179, 90, .45);
    }

    .topic-card .progress-track {
      margin-top: 2px;
    }

    .panel {
      padding: 18px;
      margin-bottom: 16px;
    }

    .panel-head {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .panel-head h3,
    .topic-card h3,
    .formula-card h3,
    .question-card h3 {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.25;
    }

    .panel-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .88rem;
    }

    .topic-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .topic-card {
      padding: 16px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .topic-card.done {
      border-color: rgba(88, 214, 141, .55);
    }

    .meta {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: .76rem;
    }

    .tag {
      border: 1px solid var(--line);
      background: rgba(40, 210, 191, .07);
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--soft);
      font-size: .74rem;
    }

    .path-hit {
      border-color: rgba(245, 179, 90, .7);
      box-shadow: 0 0 0 1px rgba(245, 179, 90, .2), var(--shadow);
    }

    .topic-card p,
    .question-card p,
    .formula-card p,
    .figure-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .simple {
      border-left: 3px solid var(--accent);
      background: rgba(40, 210, 191, .08);
      padding: 11px 12px;
      color: var(--soft);
      line-height: 1.55;
    }

    [dir="rtl"] .simple {
      border-left: 0;
      border-right: 3px solid var(--accent);
    }

    .topic-detail {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(300px, .6fr);
      gap: 14px;
      align-items: start;
    }

    .notes-list,
    .clean-list {
      margin: 0;
      padding-left: 20px;
      color: var(--soft);
      line-height: 1.6;
    }

    [dir="rtl"] .notes-list,
    [dir="rtl"] .clean-list {
      padding-left: 0;
      padding-right: 20px;
    }

    .notes-list li,
    .clean-list li {
      margin: 8px 0;
    }

    .equation {
      overflow-x: auto;
      white-space: nowrap;
      border: 1px solid var(--line);
      background: rgba(4, 10, 12, .44);
      border-radius: var(--radius);
      padding: 11px 12px;
      font-family: var(--mono);
      color: var(--text);
      line-height: 1.45;
    }

    html[data-theme="light"] .equation {
      background: #eef6f6;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 11px;
      text-align: left;
      vertical-align: top;
      line-height: 1.45;
    }

    [dir="rtl"] th,
    [dir="rtl"] td {
      text-align: right;
    }

    th {
      color: var(--text);
      background: rgba(40, 210, 191, .07);
      font-size: .82rem;
    }

    td {
      color: var(--soft);
      font-size: .88rem;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .formula-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .formula-card {
      padding: 15px;
      display: grid;
      gap: 10px;
    }

    .flash-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 14px;
      align-items: start;
    }

    .flashcard {
      min-height: 280px;
      padding: 26px;
      display: grid;
      place-items: center;
      text-align: center;
      position: relative;
    }

    .flashcard h3 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2.2rem);
      line-height: 1.2;
    }

    .flashcard p {
      margin: 16px auto 0;
      max-width: 720px;
      color: var(--soft);
      font-size: 1.04rem;
      line-height: 1.6;
    }

    .card-index {
      position: absolute;
      top: 14px;
      left: 14px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .78rem;
    }

    [dir="rtl"] .card-index {
      left: auto;
      right: 14px;
    }

    .quiz-options {
      display: grid;
      gap: 8px;
      margin: 13px 0;
    }

    .quiz-options button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px;
      text-align: left;
      line-height: 1.4;
    }

    [dir="rtl"] .quiz-options button {
      text-align: right;
    }

    .quiz-options button.correct {
      border-color: rgba(88, 214, 141, .85);
      background: rgba(88, 214, 141, .12);
    }

    .quiz-options button.wrong {
      border-color: rgba(255, 107, 107, .85);
      background: rgba(255, 107, 107, .12);
    }

    .answer-box {
      display: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(245, 179, 90, .08);
      color: var(--soft);
      line-height: 1.55;
    }

    .answer-box.visible {
      display: block;
    }

    .check-row {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
      color: var(--soft);
      line-height: 1.5;
    }

    .check-row:last-child {
      border-bottom: 0;
    }

    .check-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      margin-top: 2px;
    }

    .seg {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .seg button {
      min-height: 36px;
      padding: 8px 10px;
      font-size: .86rem;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .calc-result {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .mini {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 11px;
      background: rgba(40, 210, 191, .06);
      min-height: 78px;
    }

    .mini span {
      display: block;
      color: var(--muted);
      font-size: .76rem;
      margin-bottom: 7px;
    }

    .mini strong {
      font-family: var(--mono);
      font-size: .98rem;
      overflow-wrap: anywhere;
    }

    .figure-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .figure-card {
      overflow: hidden;
    }

    .figure-card img {
      background: white;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: contain;
    }

    .figure-card div {
      padding: 12px;
    }

    .empty {
      border: 1px dashed var(--line-2);
      border-radius: var(--radius);
      color: var(--muted);
      padding: 22px;
      text-align: center;
    }

    .hide {
      display: none !important;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 1020px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        z-index: 20;
        transform: translateX(-105%);
        transition: transform .22s ease;
        width: min(330px, 92vw);
      }

      [dir="rtl"] .sidebar {

    const icon = path => `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="${path}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>`;
    const persistSet = (key, set) => localStorage.setItem(key, JSON.stringify([...set]));
    const pathTopics = () => state.path === "full" ? TOPICS.map(x => x.id) : PATHS[state.path].topicIds;
    const percent = (value, total) => total ? Math.max(0, Math.min(100, Math.round((value / total) * 100))) : 0;

    function quizScore() {
      let correct = 0;
      MCQS.forEach(q => { if (state.quizAnswers[q.id] === q.answer) correct++; });
      return correct;
    }

    function readinessScore() {
      const topic = percent(state.doneTopics.size, TOPICS.length);
      const cards = percent(state.mastered.size, FLASHCARDS.length);
      const checklist = percent(state.checklist.size, CHECKLIST.length);
      const quiz = percent(Math.max(state.bestQuiz, quizScore()), MCQS.length);
      return Math.round(topic * .34 + cards * .2 + quiz * .28 + checklist * .18);
    }

    function nextTopic() {
      const ids = pathTopics();
      return ids.map(id => TOPICS.find(topic => topic.id === id)).filter(Boolean).find(topic => !state.doneTopics.has(topic.id)) || TOPICS.find(topic => !state.doneTopics.has(topic.id)) || TOPICS[0];
    }

    function pathProgress(pathKey) {
      const ids = pathKey === "full" ? TOPICS.map(topic => topic.id) : PATHS[pathKey].topicIds;
      const done = ids.filter(id => state.doneTopics.has(id)).length;
      return { done, total: ids.length || TOPICS.length, pct: percent(done, ids.length || TOPICS.length) };
    }

      state.mode = mode;
      localStorage.setItem("ne411.mode", state.mode);

    function assignedTopicIds() {
      const name = state.name.trim() || "You";
      let hash = 0;
      for (const ch of name) hash = (hash * 31 + ch.charCodeAt(0)) >>> 0;
      const picked = [];
      const pool = [...TOPICS];
      while (picked.length < 4 && pool.length) {
        const idx = hash % pool.length;
        picked.push(pool.splice(idx, 1)[0].id);
        hash = (hash * 17 + 13) >>> 0;
      }
      return picked;
    }

    function calculate() {
      const val = id => Number(document.getElementById(id).value);
      const keff = val("calcKeff");
      const pcmInput = val("calcPcm");
      const beta = val("calcBeta");
      const lambda = val("calcLambda");
      const gen = val("calcGen");
      const time = val("calcTime");
      const rhoFromK = (keff - 1) / keff;
      const rho = pcmInput / 100000;
      const dollars = rho / beta;
      const jump = beta / (beta - rho);
      const b = lambda + (beta - rho) / gen;
      const c = -lambda * rho / gen;
      const disc = b * b - 4 * c;
      const root = Math.sqrt(Math.max(0, disc));
      const w1 = (-b + root) / 2;
      const w2 = (-b - root) / 2;
      const period = w1 === 0 ? Infinity : 1 / w1;
      const approx = lambda * rho / (beta - rho);
      const nt = jump * Math.exp(w1 * time);
      const data = [
        ["ρ from k_eff", `${rhoFromK.toExponential(5)} = ${(rhoFromK * 100000).toFixed(1)} pcm`],
        ["Dollars / cents", `${dollars.toFixed(3)}$ = ${(dollars * 100).toFixed(1)} cents`],
        ["Prompt jump/drop", Number.isFinite(jump) ? jump.toFixed(4) : "invalid near β"],
        ["ω₁", `${w1.toFixed(6)} s^-1`],
        ["ω₂", `${w2.toFixed(3)} s^-1`],
        ["T = 1/ω₁", Number.isFinite(period) ? `${period.toFixed(2)} s` : "infinite"],
        ["Approx ω₁", `${approx.toFixed(6)} s^-1`],
        [`n(${time}s)/n₀ approx`, Number.isFinite(nt) ? nt.toFixed(4) : "check inputs"]
      ];
      document.getElementById("calcResult").innerHTML = data.map(([label, value]) => `<div class="mini"><span>${esc(label)}</span><strong>${esc(value)}</strong></div>`).join("");
    }

    function renderFlashcards() {
      const cards = FLASHCARDS.filter(c => !state.query || [c.front, c.back, c.tag].join(" ").toLowerCase().includes(state.query.toLowerCase()));
      if (!cards.length) {
        els.content.innerHTML = `<div class="empty">${t("noResults")}</div>`;
        return;
      }
      state.flashIndex = Math.min(state.flashIndex, cards.length - 1);
      const card = cards[state.flashIndex];
      const mastered = state.mastered.has(card.id);
      els.content.innerHTML = `
        <section class="flash-layout">
          <article class="flashcard">
            <span class="card-index">${state.flashIndex + 1}/${cards.length} · ${esc(card.tag)}</span>
            <div>
              <h3>${esc(state.flashBack ? card.back : card.front)}</h3>
              <p>${state.flashBack ? esc(card.front) : (state.lang === "ar" ? "اقلب البطاقة لرؤية الإجابة." : "Flip the card to reveal the answer.")}</p>
            </div>
          </article>
          <aside class="panel">
            <div class="panel-head"><div><h3>${t("flashcards")}</h3><p>${state.lang === "ar" ? "استخدم الإتقان لتتبع الحفظ." : "Use mastery to track recall."}</p></div></div>
            <div class="seg">
              <button id="prevCard">${t("prev")}</button>
              <button class="active" id="flipCard">${t("flip")}</button>
              <button id="nextCard">${t("next")}</button>
            </div>
            <div style="margin-top:12px">
              <button class="small-action ${mastered ? "" : "primary"}" id="masterCard">${mastered ? t("mastered") : t("notMastered")}</button>
            </div>
            <div class="simple" style="margin-top:12px">${state.lang === "ar" ? "نصيحة: إذا لم تستطع الإجابة قبل القلب، لا تعتبر البطاقة متقنة." : "Rule: if you cannot answer before flipping, keep it in review."}</div>
          </aside>
        </section>
      `;
    }

    function renderQuiz() {
      let correct = 0;
      const answered = Object.keys(state.quizAnswers).length;
      MCQS.forEach(q => { if (state.quizAnswers[q.id] === q.answer) correct++; });
      state.bestQuiz = Math.max(state.bestQuiz, correct);
      localStorage.setItem("ne411.bestQuiz", String(state.bestQuiz));
      els.content.innerHTML = `
        <section class="panel">
          <div class="panel-head">
            <div><h3>${t("mcq")}</h3><p>${t("score")}: ${correct}/${MCQS.length} · ${answered}/${MCQS.length} answered</p></div>
            <button class="small-action" id="resetQuiz">${state.lang === "ar" ? "إعادة الاختبار" : "Reset quiz"}</button>
          </div>
          ${MCQS.map(q => renderQuestion(q)).join("")}
        </section>
      `;
      renderStats();
    }

    function renderQuestion(q) {
      const chosen = state.quizAnswers[q.id];
      return `<article class="question-card" style="padding:15px;margin:12px 0">
        <h3>${esc(q.id.toUpperCase())}. ${esc(q.q)}</h3>
        <div class="quiz-options">
          ${q.options.map((opt, i) => {
            let cls = "";
            if (chosen !== undefined) cls = i === q.answer ? "correct" : i === chosen ? "wrong" : "";
            return `<button class="${cls}" data-quiz="${esc(q.id)}" data-choice="${i}">${esc(opt)}</button>`;
          }).join("")}
        </div>
        <div class="answer-box ${chosen !== undefined ? "visible" : ""}"><strong>${state.lang === "ar" ? "الشرح" : "Explanation"}:</strong> ${esc(q.why)}</div>
      </article>`;
    }

    function renderShortAnswers() {
      els.content.innerHTML = `
        <section class="panel">
          <div class="panel-head"><div><h3>${t("short")}</h3><p>${state.lang === "ar" ? "اكتب إجابتك ثم قارنها بالإجابة المتوقعة." : "Write your answer, then compare with the expected answer."}</p></div></div>
          ${SHORT_ANSWERS.map(sa => `
            <article class="question-card" style="padding:15px;margin:12px 0">
              <h3>${esc(sa.prompt)}</h3>
              <textarea class="textarea" placeholder="${state.lang === "ar" ? "اكتب إجابتك هنا..." : "Write your answer here..."}"></textarea>
              <div style="margin-top:10px"><button class="small-action" data-reveal="${esc(sa.id)}">${t("reveal")}</button></div>
              <div class="answer-box" id="${esc(sa.id)}"><strong>${state.lang === "ar" ? "إجابة متوقعة" : "Expected answer"}:</strong> ${esc(sa.answer)}</div>
            </article>
          `).join("")}
        </section>
      `;
    }

    function renderPractice() {
      els.content.innerHTML = `
        <section class="panel">
          <div class="panel-head"><div><h3>${t("practice")}</h3><p>${state.lang === "ar" ? "مسائل حسابية مبنية من ملاحظات المحاضرة." : "Calculation practice built from the lecture notes."}</p></div></div>
          ${PRACTICE.map(problem => `
            <article class="question-card" style="padding:15px;margin:12px 0">
              <div class="meta"><span class="tag">${esc(problem.id.toUpperCase())}</span></div>
              <h3>${esc(problem.title)}</h3>
              <p>${esc(problem.problem)}</p>
              <div style="margin-top:10px"><button class="small-action" data-reveal="${esc(problem.id)}">${t("reveal")}</button></div>
              <div class="answer-box" id="${esc(problem.id)}"><ol class="notes-list">${problem.solution.map(step => `<li>${esc(step)}</li>`).join("")}</ol></div>
            </article>
          `).join("")}
        </section>
        ${renderCalculator()}
      `;
    }

    function renderCheatSheet() {
      const core = TOPICS.filter(tpc => ["reactivity-basics", "reactivity-units", "doppler", "mtc", "void", "pke-equations", "eigenvalue-method", "prompt-jump", "six-group"].includes(tpc.id));
      els.content.innerHTML = `
        <section class="panel">
          <div class="panel-head"><div><h3>${t("cheat")}</h3><p>${state.lang === "ar" ? "صفحة واحدة للطباعة أو آخر مراجعة." : "One-page style final review for printing or final pass."}</p></div></div>
          <div class="formula-grid">
            ${core.map(tpc => `
              <article class="formula-card">
                <h3>${topicTitle(tpc)}</h3>
                <div class="simple">${esc(state.lang === "ar" ? tpc.simpleAr : tpc.simple)}</div>
                ${tpc.formulas.slice(0, 4).map(f => `<div class="equation">${esc(f)}</div>`).join("")}
                <ul class="notes-list">${tpc.mistakes.slice(0, 2).map(m => `<li>${esc(m)}</li>`).join("")}</ul>
              </article>
            `).join("")}
          </div>
        </section>
        <section class="panel">
          <div class="panel-head"><div><h3>${state.lang === "ar" ? "أرقام لا تنساها" : "Numbers to memorize"}</h3></div></div>
          <div class="topic-grid">
            ${[
              ["β_eff U-235", "≈0.0065; 1$ ≈ 650 pcm"],
              ["Prompt neutrons", "~10^-14 s after fission"],
              ["Delayed neutron timing", "0.01 to 10 s range"],
              ["λ one-group", "0.0767 s^-1; lifetime 13.04 s"],
              ["Λ LWR", "~5×10^-5 s"],
              ["PWR BOC boron", "~1000-1900 ppm"],
              ["PWR EOC boron", "~0-10 ppm"],
              ["Safety rods", "SCRAM insertion about 1-3 s"],
              ["Doppler coefficient", "-2 to -5 pcm/°C at BOC"],
              ["PWR void coefficient", "-150 to -300 pcm/% void"],
              ["BWR CPR safety limit in notes", "1.9"],
              ["One-group accuracy", "Better than 5% for |ρ| < 2000 pcm"]
            ].map(([a, b]) => `<article class="topic-card"><h3>${esc(a)}</h3><p>${esc(b)}</p></article>`).join("")}
          </div>
        </section>
      `;
    }

    function renderChecklist() {
      els.content.innerHTML = `
        <section class="panel">
          <div class="panel-head">
            <div><h3>${t("checklist")}</h3><p>${state.lang === "ar" ? "علّم ما تستطيع فعله بدون الرجوع للملاحظات." : "Check only what you can do without looking at the notes."}</p></div>
          </div>
          ${CHECKLIST.map((item, i) => `
            <label class="check-row">
              <input type="checkbox" data-check="${i}" ${state.checklist.has(String(i)) ? "checked" : ""}>
              <span>${esc(item)}</span>
            </label>
          `).join("")}
        </section>
        <section class="panel">
          <div class="panel-head"><div><h3>${t("uploadTitle")}</h3><p>${state.lang === "ar" ? "فحص تغطية الملفات المرفوعة." : "Coverage check for uploaded materials."}</p></div></div>
          <ul class="notes-list">
            <li>Reactivity_Lecture_Notes.docx: all 11 listed sections are represented, including units, rods, boron, Doppler, MTC, void coefficient, comparison tables, and practice problems.</li>
            <li>Point Kinetics Analytical_lecture Note.docx: delayed neutron physics, one-group PKE, matrix/eigenvalue solution, inhour equation, prompt jump, special cases, six-group extension, tables, figures, and practice problems are represented.</li>
            <li>All 5 embedded figures were extracted and used in the site.</li>
            <li>Formula sheet includes the equations recovered from text, tables, and Word equation objects.</li>
          </ul>
        </section>
      `;
    }

    function bind() {
      els.modeNav.addEventListener("click", event => {
        const button = event.target.closest("[data-mode]");
        if (!button) return;
        setMode(button.dataset.mode);
      });
      els.pathSelect.addEventListener("change", () => {
        state.path = els.pathSelect.value;
        localStorage.setItem("ne411.path", state.path);
        render();
      });
      els.studentName.addEventListener("input", () => {
        state.name = els.studentName.value;
        localStorage.setItem("ne411.name", state.name);
        renderAssigned();
      });
      els.searchInput.addEventListener("input", () => {
        state.query = els.searchInput.value;
        render();
      });
      els.moduleFilter.addEventListener("change", () => {
        state.moduleFilter = els.moduleFilter.value;
        render();
      });
      els.difficultyFilter.addEventListener("change", () => {
        state.difficultyFilter = els.difficultyFilter.value;
        render();
      });
      els.themeToggle.addEventListener("click", () => {
        state.theme = state.theme === "dark" ? "light" : "dark";
        localStorage.setItem("ne411.theme", state.theme);
        render();
      });
      els.langToggle.addEventListener("click", () => {
        state.lang = state.lang === "en" ? "ar" : "en";
        localStorage.setItem("ne411.lang", state.lang);
        render();
      });
      els.printButton.addEventListener("click", () => window.print());
      els.openMenu.addEventListener("click", () => els.sidebar.classList.add("open"));
      document.addEventListener("click", event => {
        if (event.target.closest("#openMenu") || event.target.closest("#sidebar")) return;
        if (innerWidth <= 1020) els.sidebar.classList.remove("open");
      });
      els.content.addEventListener("click", event => {
        const jump = event.target.closest("[data-jump-mode]");
        if (jump) {
          setMode(jump.dataset.jumpMode);
          return;
        }
        const choosePath = event.target.closest("[data-choose-path]");
        if (choosePath) {
          state.path = choosePath.dataset.choosePath;
          localStorage.setItem("ne411.path", state.path);
          render();
          return;
        }
        const done = event.target.closest("[data-done-topic]");
        if (done) {
          const id = done.dataset.doneTopic;
          state.doneTopics.has(id) ? state.doneTopics.delete(id) : state.doneTopics.add(id);
          persistSet("ne411.doneTopics", state.doneTopics);
          render();
          return;
        }
        const reveal = event.target.closest("[data-reveal]");
        if (reveal) {
          const box = document.getElementById(reveal.dataset.reveal);
          if (box) {
            box.classList.toggle("visible");
            reveal.textContent = box.classList.contains("visible") ? t("hide") : t("reveal");
          }
          return;
        }
        const quiz = event.target.closest("[data-quiz]");
        if (quiz) {
          state.quizAnswers[quiz.dataset.quiz] = Number(quiz.dataset.choice);
          localStorage.setItem("ne411.quizAnswers", JSON.stringify(state.quizAnswers));
          renderQuiz();
          return;
        }
        if (event.target.closest("#resetProgress")) {
          if (confirm("Reset NE-411 progress?")) {
            ["ne411.doneTopics", "ne411.mastered", "ne411.checklist", "ne411.quizAnswers", "ne411.bestQuiz"].forEach(k => localStorage.removeItem(k));
            state.doneTopics.clear();
            state.mastered.clear();
            state.checklist.clear();
            state.quizAnswers = {};
            state.bestQuiz = 0;
            render();
          }
          return;
        }
        if (event.target.closest("#resetQuiz")) {
          state.quizAnswers = {};
          localStorage.setItem("ne411.quizAnswers", "{}");
          renderQuiz();
          return;
        }
        if (event.target.closest("#prevCard")) {
          state.flashIndex = Math.max(0, state.flashIndex - 1);
          state.flashBack = false;
          localStorage.setItem("ne411.flashIndex", state.flashIndex);
          renderFlashcards();
          return;
        }
        if (event.target.closest("#nextCard")) {
          state.flashIndex = Math.min(FLASHCARDS.length - 1, state.flashIndex + 1);
          state.flashBack = false;
          localStorage.setItem("ne411.flashIndex", state.flashIndex);
          renderFlashcards();
          return;
        }
        if (event.target.closest("#flipCard")) {
          state.flashBack = !state.flashBack;
          renderFlashcards();
          return;
        }
        if (event.target.closest("#masterCard")) {
          const card = FLASHCARDS[state.flashIndex];
          state.mastered.has(card.id) ? state.mastered.delete(card.id) : state.mastered.add(card.id);
          persistSet("ne411.mastered", state.mastered);
          render();
          return;
        }
        if (event.target.closest("#calcButton")) {
          calculate();
        }
      });
      els.content.addEventListener("change", event => {
        const check = event.target.closest("[data-check]");
        if (!check) return;
        check.checked ? state.checklist.add(check.dataset.check) : state.checklist.delete(check.dataset.check);
        persistSet("ne411.checklist", state.checklist);
      });
    }

    bind();
    render();
  </script>
</body>
</html>
